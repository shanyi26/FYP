<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <style>
      .title { font: 700 24px 'Times New Roman', serif; fill: #222; }
      .label { font: 700 17px 'Times New Roman', serif; fill: #222; }
      .text { font: 14px 'Times New Roman', serif; fill: #444; }
      .node { fill: #f6f8fb; stroke: #506070; stroke-width: 2; rx: 10; ry: 10; }
      .contest { fill: #eef5ef; stroke: #4f7a58; stroke-width: 2; rx: 10; ry: 10; }
      .arrow { stroke: #506070; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <text x="490" y="36" text-anchor="middle" class="title">Route Structure</text>

  <rect x="405" y="70" width="170" height="58" class="node" />
  <text x="490" y="104" text-anchor="middle" class="label">Root</text>

  <rect x="90" y="185" width="150" height="58" class="node" />
  <text x="165" y="218" text-anchor="middle" class="label">/login</text>

  <rect x="275" y="185" width="150" height="58" class="node" />
  <text x="350" y="218" text-anchor="middle" class="label">/register</text>

  <rect x="460" y="185" width="180" height="58" class="contest" />
  <text x="550" y="218" text-anchor="middle" class="label">/contest</text>

  <rect x="675" y="185" width="180" height="58" class="node" />
  <text x="765" y="218" text-anchor="middle" class="label">/profile</text>

  <rect x="430" y="305" width="240" height="60" class="contest" />
  <text x="550" y="330" text-anchor="middle" class="label">/contest/:contestId</text>
  <text x="550" y="350" text-anchor="middle" class="text">Contest overview and actions</text>

  <rect x="70" y="430" width="220" height="60" class="node" />
  <text x="180" y="455" text-anchor="middle" class="label">/contest/:contestId/problem/:problemId</text>
  <text x="180" y="475" text-anchor="middle" class="text">Problem statement and editor</text>

  <rect x="320" y="430" width="180" height="60" class="node" />
  <text x="410" y="455" text-anchor="middle" class="label">/submissions</text>
  <text x="410" y="475" text-anchor="middle" class="text">Submission history</text>

  <rect x="530" y="430" width="180" height="60" class="node" />
  <text x="620" y="455" text-anchor="middle" class="label">/ranking</text>
  <text x="620" y="475" text-anchor="middle" class="text">Standings view</text>

  <rect x="740" y="430" width="160" height="60" class="node" />
  <text x="820" y="455" text-anchor="middle" class="label">/faq</text>
  <text x="820" y="475" text-anchor="middle" class="text">Guidance and help</text>

  <line x1="490" y1="128" x2="165" y2="185" class="arrow" />
  <line x1="490" y1="128" x2="350" y2="185" class="arrow" />
  <line x1="490" y1="128" x2="550" y2="185" class="arrow" />
  <line x1="490" y1="128" x2="765" y2="185" class="arrow" />

  <line x1="550" y1="243" x2="550" y2="305" class="arrow" />

  <line x1="550" y1="365" x2="180" y2="430" class="arrow" />
  <line x1="550" y1="365" x2="410" y2="430" class="arrow" />
  <line x1="550" y1="365" x2="620" y2="430" class="arrow" />
  <line x1="550" y1="365" x2="820" y2="430" class="arrow" />
</svg>
