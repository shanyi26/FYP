      .node { fill: #f6f8fb; stroke: #506070; stroke-width: 2; rx: 10; ry: 10; }
      .contest { fill: #eef5ef; stroke: #4f7a58; stroke-width: 2; rx: 10; ry: 10; }
      .line { stroke: #506070; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <text x="560" y="36" text-anchor="middle" class="title">Route Structure</text>

  <rect x="470" y="60" width="180" height="62" class="node" />
